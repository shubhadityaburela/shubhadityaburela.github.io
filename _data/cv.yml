#    - title: Master thesis student
#      institution: Institute of Software and Tools for Computational Engineering (STCE), RWTH Aachen University
#      year: Oct 2020 - Jun 2021
#      description:
#        - I worked on optimizing the computational cost of the <i> <strong> Hessian tensor accumulation in deep neural networks by developing a Dynamic Programming algorithm </strong> </i> for Hessian Chaining Problem which is generated by the second-order optimization of the loss function of a feedforward deep neural network. The loss functions are multivariate composite vector functions that give rise to a chain of Jacobians and Hessians multiplied together. The complexity of the above combinatorial problem is brought down to polynomial time from NP-complete via a well-designed Dynamic programming algorithm.
#
#    - title: Student scientific assistant
#      institution: Institute of combustion engines (VKA), RWTH Aachen University
#      year: Jun 2019 - Jun 2021
#      description:
#        - I worked on developing a <i> <strong> Finite Element solver for the Thermo-hydrodynamic analysis of Thrust Bearings in automotive turbochargers </strong> </i>. My work comprised of writing FORTRAN subroutines for meshing the geometry, implementing various mathematical models namely the Cavitation model, Asperity contact model, and Thermal model, and writing subroutines for sparsifying the system and post-processing the results in Paraview. The models implemented are examples of Transient Convection-Diffusion type of equations with source terms which are solved by Stabilized Finite Element Methods instead of simple Galerkin formulation. Transient dynamic simulations of the turbocharger assembly are performed and the friction, oil flow, pressure, and temperature results are then sufficiently validated with the available bearing friction measurements obtained from the test bench. The solver is part of a bigger <i> <strong> commercial Multi-body dynamics software package FEV Virtual Engine which is based on the MSC Adams software </strong> </i>.
